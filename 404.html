<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error</title>
  <style>
    body{
      background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100"><rect width="100" height="100" fill="%23f0e6d6"/><path d="M10 10 L90 10 L90 90 L10 90 Z" fill="none" stroke="%23d4c4b0" stroke-width="2"/></svg>');
    }
    .bloque {
       background-color: #d4b896;
     padding: 25px;
     border: var(--borde);
     margin: 30px 0;
     color: #2c1810;
     border-radius: 30px;
     box-shadow: 10px 10px 20px black;
     border:  12px solid #b8860b;

    }
    h2 {
      font-size: 60px;
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
      text-align: center;
    }
    h3 {
      font-size: 35px;
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
      text-align: center;
    }
    .bloque img{
      opacity: 0.5;
      display: block;
      margin: auto;
    }
    .bloque a{

      text-decoration: none;
      color: #2c1810;
      font-size: large;


    }
    .bloque button{
      display: flex;
      justify-self: center;
      padding: 10px 30px;
      background-color: rgb(240, 131, 7);
      border-radius: 30px;
      border: groove 5px black;
    }
    .bloque button:hover {
      background-color: rgb(243, 47, 47);
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }
    .bloque button:active {
      transform: scale(91%);
    }

  </style>
</head>
<body>
  <div class="bloque">
    <h2>Error 404</h2>
    <h3>Vaya, parece que no puedes acceder 😥</h3>
    <img src="/images/skull.png"  alt="skull">
    <button><a href="index.html">Vuelve al principio🏡</a></button>


  </div>

</body>
</html>
